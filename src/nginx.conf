resolver 127.0.0.11 valid=10s ipv6=off;

# Upstream timing for profiling (request_time = full client round-trip; upstream_* = core only).
log_format cqds_timing '$time_iso8601 $request_method $uri '
    'status=$status bytes=$body_bytes_sent '
    'request_time=$request_time upstream_response_time=$upstream_response_time '
    'upstream=$upstream_addr';

server {
    listen 8008;
    access_log /dev/stdout cqds_timing;

    location /api/ {
        # JSON вместо HTML-заглушки nginx — фронт показывает детали (upstream, URI).
        error_page 500 502 503 504 = @cqds_api_gateway_error;
        # Resolver + переменная в proxy_pass — переопрос DNS после смены IP colloquium-core.
        # set ДО rewrite ... break: иначе break пропускает инициализацию → «uninitialized cqds_core_upstream», no host in :8080, 500.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $cqds_core_upstream colloquium-core;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$cqds_core_upstream:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Только ошибки, сгенерированные самим nginx для /api/ (нет соединения с colloquium-core и т.п.).
    # Ответы 5xx от FastAPI сюда не попадают при proxy_intercept_errors off.
    location @cqds_api_gateway_error {
        internal;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 502 '{"source":"nginx-router","gateway":true,"http_status":502,"upstream_addr":"$upstream_addr","upstream_status":"$upstream_status","upstream_response_time":"$upstream_response_time","request_uri":"$request_uri","request_method":"$request_method","detail":"Не удалось получить HTTP-ответ от colloquium-core (см. docker logs cqds-nginx-router)"}';
    }

    # Transparent MCP server proxy: /mcp/{container_name}/{mcp_path}
    # Requires nginx-router to be on mcp_debug_net alongside target containers.
    location ~ ^/mcp/(?<mcp_host>[^/]+)/(?<mcp_path>.*)$ {
        set $target_mcp_host $mcp_host;
        proxy_pass http://$target_mcp_host:8084/$mcp_path$is_args$args;
        proxy_set_header Host $target_mcp_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        set $frontend_upstream frontend;
        proxy_pass http://$frontend_upstream:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        # And now all the stuff from above, again.
        proxy_set_header    Host                $host;
        proxy_set_header    X-Real-IP           $remote_addr;
        proxy_set_header    X-Forwarded-Host    localhost;
        proxy_set_header    X-Forwarded-Server  localhost;
        proxy_set_header    X-Forwarded-Proto   $scheme;
        proxy_set_header    X-Forwarded-For     $remote_addr;
        proxy_redirect off;
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
