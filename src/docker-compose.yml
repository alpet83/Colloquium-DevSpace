# Имена контейнеров: ${COMPOSE_PROJECT_NAME:-cqds}-<роль>. Сетевые aliases (colloquium-core, postgres, …)
# сохраняют прежние DNS-имена внутри devspace-net. На хосте: docker compose exec <service> или имя из docker compose ps.
services:
  postgres:
    image: postgres:17-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-cqds}-postgres
    entrypoint: ["/bin/sh", "/opt/cqds-postgres/start-with-startup-backup.sh"]
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
      # Пароль из секрета; проверка непустоты — только при первом init (пустой PGDATA).
      - POSTGRES_PASSWORD_FILE=/run/secrets/cqds_db_password
      - POSTGRES_ROOT_PASSWORD_FILE=/run/secrets/cqds_db_password
      # Без PGHOST=127.0.0.1: скрипты init используют сокет; TCP на localhost при init ещё не поднят.
      - PGPORT=5432
      - PGUSER=cqds
      - PGDATABASE=cqds
      - PGPASSWORD_FILE=/run/secrets/cqds_db_password
      - BACKUP_DIR=/backups/pg
      - RETENTION_DAYS=14
    volumes:
      # Дампы БД только ./data/backups/pg -> /backups/pg. Папка ./backups/ у корня не используется (см. backups/README.txt).
      # Мажорное обновление PG (16→17): том cqds_postgres_data с данными 16 нельзя просто подключить к 17 — см. postgres/BACKUPS.txt.
      - cqds_postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./postgres:/opt/cqds-postgres:ro
      - ./secrets:/run/secrets:ro
      - ./data/backups/pg:/backups/pg
    networks:
      devspace-net:
        aliases:
          - cqds-postgres
    healthcheck:                                                    
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  colloquium-core:
    build:
      context: .
      dockerfile: Dockerfile.core
    container_name: ${COMPOSE_PROJECT_NAME:-cqds}-core
    volumes:
      - ./data:/app/data
      - ./data/backups/pg:/backups/pg
      - ./logs:/app/logs
      # Каталоги репозиториев: в БД projects.project_name → подпапка /app/projects/<project_name>/.
      # Если её нет или пуста, scan не добавляет файлы, существующие ссылки в attached_files деградируют по TTL
      # и пропадают из file_index. Для bind реальных деревьев с хоста см. docker-compose.override.yml.
      - ./projects:/app/projects
      - ./agent:/app/agent
      - ./tests:/app/tests
      - ../docs:/app/docs
      - ./postgres:/app/postgres:ro
      - ./secrets:/run/secrets:ro
    networks:
      devspace-net:
        aliases:
          - colloquium-core
    depends_on:
      mcp-sandbox:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      # Раскомментируйте для поиска «залипаний» API под нагрузкой (filewalk и т.п.):
      # - CORE_SLOW_REQUEST_LOG_MS=400
      - DEBUG_MODE=False
      - SQLITE_PATH=/app/data/multichat.db
      - RETENTION_DAYS=14
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=cqds
      - PGPASSWORD_FILE=/run/secrets/cqds_db_password
      - PGDATABASE=cqds
      - MCP_SERVER_URL=http://mcp-sandbox:8084
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:?MCP_AUTH_TOKEN is required}
      # Плановый перезапуск ядра (утечки/деградация). Время по IANA-зоне CORE_NIGHTLY_RESTART_TZ (например как на хосте).
      - CORE_NIGHTLY_RESTART=1
      - CORE_NIGHTLY_RESTART_CRON=0 3 * * *
      - CORE_NIGHTLY_RESTART_TZ=Europe/Moscow
      - CORE_MAINT_ENABLED=1
      - CORE_MAINT_MUTATE=1
      # Пул maint-воркеров (подпроцессы + maint_pool_jobs). По умолчанию 1 = прежнее поведение.
      # - CORE_MAINT_POOL_WORKERS=3
      # - CORE_MAINT_POOL_LEASE_SEC=600
      # - CORE_MAINT_POOL_PROGRESS_SEC=8
      # - CORE_MAINT_POOL_IDLE_SLEEP_SEC=4   # воркер без job в очереди (без find/scan по проектам)
      # Phase-2 cache optimization toggles (safe rollout):
      # - PROBE: validates prefix+delta candidate against baseline hash.
      # - REUSE: allows CPU-saving fast path when candidate is valid.
      - CQDS_CONTEXT_PREFIX_REUSE_PROBE=1
      - CQDS_CONTEXT_PREFIX_REUSE=1
      # Phase-3 provider-aware optimization (OpenRouter/Anthropic prompt caching).
      - CQDS_PROVIDER_PREFIX_CACHE=1
      - CORE_MAINT_POOL_WORKERS=3
    # ENTRYPOINT 
    command: ["/app/agent/server.py"]
    # unless-stopped: плановый SIGTERM от CoreScheduler (CORE_NIGHTLY_RESTART) снова поднимает контейнер.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/docs"]
      interval: 15s
      timeout: 10s
      retries: 5
      # Пока идёт синхронный server_init() до bind :8080, wget падает — не помечать unhealthy слишком рано.
      start_period: 120s
    logging:
      options:
        max-size: "1m"
        max-file: "3"  
  mcp-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-cqds}-mcp-sandbox
    ports:
      - "8084:8084"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      # Должен совпадать с colloquium-core по деревьям проектов (те же bind’ы в override).
      - ./projects:/app/projects
      - /app/sandwiches
      - ./agent:/app/agent:ro
    environment:
      - RUST_LOG=debug
    networks:
      devspace-net:
        aliases:
          - mcp-sandbox

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ${COMPOSE_PROJECT_NAME:-cqds}-frontend
    volumes:
      - ./frontend:/app/frontend
      - ./logs:/app/logs
    networks:
      devspace-net:
        aliases:
          - frontend
    depends_on:
      - colloquium-core

  nginx-router:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: ${COMPOSE_PROJECT_NAME:-cqds}-nginx-router
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8008:8008"
    networks:
      devspace-net:
        aliases:
          - nginx-router
    depends_on:
      colloquium-core:
        condition: service_healthy
      frontend:
        condition: service_started

networks:
  devspace-net:
    driver: bridge

volumes:
  data_volume:
  logs_volume:
  cqds_postgres_data:
    name: cqds_postgres_data
