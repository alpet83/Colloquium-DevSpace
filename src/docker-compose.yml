services:
  postgres:
    image: postgres:17-alpine
    container_name: cqds-postgres
    entrypoint: ["/bin/sh", "/opt/cqds-postgres/start-with-startup-backup.sh"]
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
      # Пароль из секрета; проверка непустоты — только при первом init (пустой PGDATA).
      - POSTGRES_PASSWORD_FILE=/run/secrets/cqds_db_password
      - POSTGRES_ROOT_PASSWORD_FILE=/run/secrets/cqds_db_password
      # Без PGHOST=127.0.0.1: скрипты init используют сокет; TCP на localhost при init ещё не поднят.
      - PGPORT=5432
      - PGUSER=cqds
      - PGDATABASE=cqds
      - PGPASSWORD_FILE=/run/secrets/cqds_db_password
      - BACKUP_DIR=/backups/pg
      - RETENTION_DAYS=14
    volumes:
      # Дампы БД только ./data/backups/pg -> /backups/pg. Папка ./backups/ у корня не используется (см. backups/README.txt).
      # Мажорное обновление PG (16→17): том cqds_postgres_data с данными 16 нельзя просто подключить к 17 — см. postgres/BACKUPS.txt.
      - cqds_postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./postgres:/opt/cqds-postgres:ro
      - ./secrets:/run/secrets:ro
      - ./data/backups/pg:/backups/pg
    networks:
      - devspace-net
    healthcheck:                                                    
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  colloquium-core:
    build:
      context: .
      dockerfile: Dockerfile.core
    container_name: colloquium-core
    volumes:
      - ./data:/app/data
      - ./data/backups/pg:/backups/pg
      - ./logs:/app/logs
      - ./projects:/app/projects
      - ./agent:/app/agent
      - ./tests:/app/tests
      - ../docs:/app/docs
      - ./postgres:/app/postgres:ro
      - ./secrets:/run/secrets:ro
    networks:
      - devspace-net
    depends_on:
      mcp-sandbox:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG_MODE=True
      - SQLITE_PATH=/app/data/multichat.db
      - RETENTION_DAYS=14
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=cqds
      - PGPASSWORD_FILE=/run/secrets/cqds_db_password
      - PGDATABASE=cqds
      - MCP_SERVER_URL=http://mcp-sandbox:8084
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:?MCP_AUTH_TOKEN is required}
    # ENTRYPOINT доустанавливает apscheduler в venv при необходимости; аргумент — скрипт ядра.
    command: ["/app/agent/server.py"]
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      options:
        max-size: "1m"
        max-file: "3"  
  mcp-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-sandbox
    ports:
      - "8084:8084"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./projects:/app/projects
      - /app/sandwiches
      - ./agent:/app/agent:ro
    environment:
      - RUST_LOG=debug
    networks:
      - devspace-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: frontend
    volumes:
      - ./frontend:/app/frontend
      - ./logs:/app/logs
    networks:
      - devspace-net
    depends_on:
      - colloquium-core

  nginx-router:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: nginx-router
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8008:8008"
    networks:
      - devspace-net
    depends_on:
      - colloquium-core
      - frontend

networks:
  devspace-net:
    driver: bridge

volumes:
  data_volume:
  logs_volume:
  cqds_postgres_data:
    name: cqds_postgres_data
