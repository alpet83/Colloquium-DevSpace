services:
  postgres:
    image: postgres:16-alpine
    container_name: cqds-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=${DB_ROOT_PASSWD:?DB_ROOT_PASSWD is required}
      - POSTGRES_ROOT_PASSWORD=${DB_ROOT_PASSWD:?DB_ROOT_PASSWD is required}
      - POSTGRES_ROOT_PASSWORD_FILE=/run/secrets/cqds_db_password
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./secrets:/run/secrets:ro
    networks:
      - devspace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  colloquium-core:
    build:
      context: .
      dockerfile: Dockerfile.core
    container_name: colloquium-core
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./projects:/app/projects
      - ./agent:/app/agent
      - ./tests:/app/tests
      - ../docs:/app/docs
      - ./postgres:/app/postgres:ro
      - ./secrets:/run/secrets:ro
    networks:
      - devspace-net
    depends_on:
      mcp-sandbox:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - DEBUG_MODE=True
      - SQLITE_PATH=/app/data/multichat.db
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=cqds
      - PGPASSWORD=${DB_ROOT_PASSWD:-}
      - PGPASSWORD_FILE=/run/secrets/cqds_db_password
      - PGDATABASE=cqds
    command: >
      sh -c "python /app/postgres/migrate_sqlite_to_postgres.py && python3 /app/agent/server.py"
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  mcp-sandbox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-sandbox
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./projects:/app/projects
      - /app/sandwiches
      - ./agent:/app/agent:ro
    environment:
      - RUST_LOG=debug
    networks:
      - devspace-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: frontend
    volumes:
      - ./frontend:/app/frontend
      - ./logs:/app/logs
    networks:
      - devspace-net
    depends_on:
      - colloquium-core

  nginx-router:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: nginx-router
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8008:8008"
    networks:
      - devspace-net
    depends_on:
      - colloquium-core
      - frontend

networks:
  devspace-net:
    driver: bridge

volumes:
  data_volume:
  logs_volume:
