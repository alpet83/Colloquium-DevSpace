[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
norecursedirs = .git __pycache__ .venv venv node_modules build dist
addopts = -q --tb=short
# Таймаут pytest-timeout на импорте/нативном коде часто не срабатывает.
# Жёсткий лимит: scripts/run_code_index_incremental_tests.py (subprocess + timeout).
