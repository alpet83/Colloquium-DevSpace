name: Text Editor Phase1 Tests

on:
  push:
    paths:
      - "mcp-tools/text_editor/**"
      - "mcp-tools/tests/test_text_editor_phase1_*.py"
      - ".github/workflows/text-editor-phase1-tests.yml"
  pull_request:
    paths:
      - "mcp-tools/text_editor/**"
      - "mcp-tools/tests/test_text_editor_phase1_*.py"
      - ".github/workflows/text-editor-phase1-tests.yml"
  workflow_dispatch:

jobs:
  phase1-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependency
        run: python -m pip install --upgrade pip pytest

      - name: Run mandatory A-G + baseline + H-I smoke
        run: |
          pytest -q \
            mcp-tools/tests/test_text_editor_phase1_ag.py \
            mcp-tools/tests/test_text_editor_phase1_basic.py \
            mcp-tools/tests/test_text_editor_phase1_hi_smoke.py
